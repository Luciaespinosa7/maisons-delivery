<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maisons du Monde - Gestión de Entregas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h1 {
            margin-bottom: 10px;
            color: #333;
        }

        .login-card p {
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .login-error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: none;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header-right {
            text-align: right;
        }

        .user-info {
            background: rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
        }

        .user-info strong {
            display: block;
        }

        .logout-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #ff5252;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            background: #f8f9fa;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }

        .content {
            display: none;
            padding: 30px;
        }

        .content.active {
            display: block;
        }

        .form-section {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #eee;
        }

        .form-section h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .cost-summary {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .cost-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .cost-total {
            border-top: 2px solid rgba(255, 255, 255, 0.5);
            padding-top: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 18px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            margin-right: 10px;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        table thead {
            background: #f8f9fa;
            border-bottom: 2px solid #ddd;
        }

        table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        table tbody tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-primary {
            background: #e7f3ff;
            color: #0066cc;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .hidden {
            display: none;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                text-align: center;
            }
            .header-right {
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- PANTALLA DE LOGIN -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <h1>📦 Maisons du Monde</h1>
            <p>Sistema de Gestión de Entregas</p>
            
            <div class="login-error" id="login-error"></div>
            
            <div class="form-group">
                <label for="employee-id">Número de Empleado</label>
                <input type="text" id="employee-id" placeholder="Ingresa tu número" autocomplete="off">
            </div>

            <button class="btn-login" onclick="app.login()">Acceder</button>
        </div>
    </div>

    <!-- APLICACIÓN PRINCIPAL -->
    <div id="app-screen" class="container">
        <header>
            <div class="header-left">
                <h1>📦 Maisons du Monde</h1>
                <p>Sistema de Gestión de Entregas</p>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <strong id="user-name">-</strong>
                    <span id="user-id">-</span>
                    <button class="logout-btn" onclick="app.logout()">Logout</button>
                </div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-button active" onclick="app.switchTab('crear')">➕ Crear Pedido</button>
            <button class="tab-button" onclick="app.switchTab('listar')">📋 Ver Pedidos</button>
        </div>

        <!-- TAB 1: CREAR PEDIDO -->
        <div id="crear" class="content active">
            <div id="mensaje-crear"></div>

            <div class="form-section">
                <h3>📄 Factura</h3>
                <div class="form-group">
                    <label for="invoice">Número de Factura *</label>
                    <input type="text" id="invoice" placeholder="Ej: FAC2024001" required>
                </div>
            </div>

            <div class="form-section">
                <h3>👤 Datos del Cliente</h3>
                <div class="grid">
                    <div class="form-group">
                        <label for="customer-name">Nombre Completo *</label>
                        <input type="text" id="customer-name" placeholder="Ej: Juan García" required>
                    </div>
                    <div class="form-group">
                        <label for="customer-email">Email</label>
                        <input type="email" id="customer-email" placeholder="Ej: juan@email.com">
                    </div>
                </div>
                <div class="form-group">
                    <label for="customer-phone">Teléfono</label>
                    <input type="tel" id="customer-phone" placeholder="Ej: +376 123456">
                </div>
            </div>

            <div class="form-section">
                <h3>🏠 Domicilio</h3>
                <div class="form-group">
                    <label for="address">Calle y Número *</label>
                    <input type="text" id="address" placeholder="Ej: Carrer de la Pau, 5" required>
                </div>
                <div class="grid">
                    <div class="form-group">
                        <label for="population">Población *</label>
                        <select id="population" required>
                            <option value="">Selecciona población...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Código Postal</label>
                        <input type="text" id="postal-code" disabled style="background: #f0f0f0;">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>📦 Logística</h3>
                <div class="checkbox-group">
                    <input type="checkbox" id="needs-assembly" onchange="app.toggleAssembly()">
                    <label for="needs-assembly">¿Necesita montaje/ensamblaje?</label>
                </div>

                <div id="assembly-time-group" class="hidden form-group">
                    <label for="assembly-time">Tiempo de montaje</label>
                    <select id="assembly-time">
                        <option value="15">15 minutos</option>
                        <option value="30">30 minutos</option>
                        <option value="45">45 minutos</option>
                        <option value="60">60 minutos</option>
                        <option value="75">75 minutos</option>
                        <option value="90">90 minutos</option>
                    </select>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="has-elevator">
                    <label for="has-elevator">¿Vivienda con ascensor?</label>
                </div>

                <div class="form-group">
                    <label for="observations">Observaciones</label>
                    <textarea id="observations" placeholder="Ej: 4ª planta, no tocar timbre, dejar en porche..."></textarea>
                </div>
            </div>

            <div class="cost-summary">
                <div class="cost-row">
                    <span>Porte de envío:</span>
                    <span id="cost-shipping">0.00€</span>
                </div>
                <div class="cost-row" id="cost-assembly-row" style="display: none;">
                    <span>Montaje/ensamblaje:</span>
                    <span id="cost-assembly">0.00€</span>
                </div>
                <div class="cost-row cost-total">
                    <span>TOTAL:</span>
                    <span id="cost-total">0.00€</span>
                </div>
            </div>

            <button class="btn-primary" onclick="app.crearPedido()">✅ CREAR PEDIDO</button>
        </div>

        <!-- TAB 2: LISTAR PEDIDOS -->
        <div id="listar" class="content">
            <h3 style="margin-bottom: 20px;">📋 Pedidos Registrados</h3>
            
            <div class="grid" style="margin-bottom: 20px;">
                <input type="text" id="filtro-cliente" placeholder="🔍 Buscar cliente o factura..." onkeyup="app.filtrarPedidos()">
                <select id="filtro-estado" onchange="app.filtrarPedidos()">
                    <option value="">Todos los estados</option>
                    <option value="registrado">Registrado</option>
                    <option value="confirmado">Confirmado</option>
                    <option value="en_reparto">En Reparto</option>
                    <option value="entregado">Entregado</option>
                    <option value="no_disponible">No Disponible</option>
                </select>
            </div>

            <div class="table-responsive" id="tabla-pedidos"></div>
        </div>
    </div>

    <!-- MODAL: DETALLES -->
    <div id="modal-pedido" class="modal">
        <div class="modal-content">
            <div class="modal-header">Detalles del Pedido</div>
            <div id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="app.cerrarModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        // TABLA DE EMPLEADOS (LOCAL)
        const EMPLEADOS = {
            '5739': 'Eloy',
            '1974': 'María del Mar',
            '5562': 'Marisol',
            '0000': 'Equipo Logística',
            '5663': 'Lucía - Administradora'
        };

        // Objeto global de la app
        const app = {
            currentUser: null,
            poblacionesData: [],
            pedidosData: [],

            // LOGIN
            login: function() {
                const employeeId = document.getElementById('employee-id').value.trim();
                
                if (!employeeId) {
                    this.mostrarLoginError('Ingresa tu número de empleado');
                    return;
                }

                if (!EMPLEADOS[employeeId]) {
                    this.mostrarLoginError('Número de empleado no válido');
                    return;
                }

                this.currentUser = {
                    id: employeeId,
                    name: EMPLEADOS[employeeId]
                };

                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('user-name').textContent = this.currentUser.name;
                document.getElementById('user-id').textContent = `(${this.currentUser.id})`;

                this.init();
            },

            logout: function() {
                this.currentUser = null;
                document.getElementById('app-screen').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('employee-id').value = '';
            },

            mostrarLoginError: function(msg) {
                const error = document.getElementById('login-error');
                error.textContent = msg;
                error.style.display = 'flex';
                setTimeout(() => { error.style.display = 'none'; }, 5000);
            },

            // INICIALIZAR
            init: async function() {
                await this.cargarPoblaciones();
                await this.cargarPedidos();
            },

            // CARGAR POBLACIONES (DESDE API VERCEL)
            cargarPoblaciones: async function() {
                try {
                    console.log('Cargando poblaciones...');
                    const response = await fetch('/api/populations');
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    console.log('Poblaciones cargadas:', data.length);

                    this.poblacionesData = data || [];
                    const select = document.getElementById('population');
                    select.innerHTML = '<option value="">Selecciona población...</option>';
                    
                    this.poblacionesData.forEach(p => {
                        const option = document.createElement('option');
                        option.value = p.id;
                        option.textContent = `${p.name} (${p.zone})`;
                        select.appendChild(option);
                    });

                    select.addEventListener('change', () => this.actualizarCostes());
                } catch (err) {
                    console.error('Error cargando poblaciones:', err);
                    this.mostrarMensaje('crear', `⚠️ Error cargando pueblos: ${err.message}`, 'error');
                }
            },

            // ACTUALIZAR COSTES
            actualizarCostes: function() {
                const poblacionId = document.getElementById('population').value;
                const poblacion = this.poblacionesData.find(p => p.id === poblacionId);

                if (poblacion) {
                    document.getElementById('postal-code').value = poblacion.name;
                    
                    const shipping = parseFloat(poblacion.shipping_cost);
                    let assembly = 0;

                    if (document.getElementById('needs-assembly').checked) {
                        assembly = parseFloat(poblacion.assembly_cost);
                        document.getElementById('cost-assembly-row').style.display = 'flex';
                        document.getElementById('cost-assembly').textContent = assembly.toFixed(2) + '€';
                    } else {
                        document.getElementById('cost-assembly-row').style.display = 'none';
                    }

                    document.getElementById('cost-shipping').textContent = shipping.toFixed(2) + '€';
                    document.getElementById('cost-total').textContent = (shipping + assembly).toFixed(2) + '€';
                }
            },

            // TOGGLE MONTAJE
            toggleAssembly: function() {
                const checked = document.getElementById('needs-assembly').checked;
                document.getElementById('assembly-time-group').classList.toggle('hidden', !checked);
                this.actualizarCostes();
            },

            // CREAR PEDIDO
            crearPedido: async function() {
                const invoice = document.getElementById('invoice').value.trim().toUpperCase();
                const customerName = document.getElementById('customer-name').value.trim();
                const customerEmail = document.getElementById('customer-email').value.trim();
                const customerPhone = document.getElementById('customer-phone').value.trim();
                const address = document.getElementById('address').value.trim();
                const populationId = document.getElementById('population').value;
                const needsAssembly = document.getElementById('needs-assembly').checked;
                const assemblyTime = needsAssembly ? parseInt(document.getElementById('assembly-time').value) : null;
                const hasElevator = document.getElementById('has-elevator').checked;
                const observations = document.getElementById('observations').value.trim();

                if (!invoice) return this.mostrarMensaje('crear', 'Número de factura obligatorio', 'error');
                if (!customerName) return this.mostrarMensaje('crear', 'Nombre del cliente obligatorio', 'error');
                if (!address) return this.mostrarMensaje('crear', 'Dirección obligatoria', 'error');
                if (!populationId) return this.mostrarMensaje('crear', 'Población obligatoria', 'error');

                try {
                    const poblacion = this.poblacionesData.find(p => p.id === populationId);
                    const shippingCost = parseFloat(poblacion.shipping_cost);
                    const assemblyCost = needsAssembly ? parseFloat(poblacion.assembly_cost) : 0;

                    const response = await fetch('/api/orders', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            invoice_number: invoice,
                            created_by_employee_id: this.currentUser.id,
                            customer_name: customerName,
                            customer_email: customerEmail || null,
                            customer_phone: customerPhone || null,
                            address: address,
                            population_id: populationId,
                            shipping_cost: shippingCost,
                            assembly_cost: assemblyCost,
                            needs_assembly: needsAssembly,
                            assembly_time: assemblyTime,
                            has_elevator: hasElevator,
                            observations: observations || null,
                            status: 'registrado'
                        })
                    });

                    if (!response.ok) throw new Error('Error creando pedido');

                    this.mostrarMensaje('crear', `✅ Pedido creado: ${invoice}`, 'success');
                    this.limpiarFormularioPedido();
                    await this.cargarPedidos();
                } catch (err) {
                    console.error(err);
                    this.mostrarMensaje('crear', `Error: ${err.message}`, 'error');
                }
            },

            limpiarFormularioPedido: function() {
                document.getElementById('invoice').value = '';
                document.getElementById('customer-name').value = '';
                document.getElementById('customer-email').value = '';
                document.getElementById('customer-phone').value = '';
                document.getElementById('address').value = '';
                document.getElementById('population').value = '';
                document.getElementById('postal-code').value = '';
                document.getElementById('needs-assembly').checked = false;
                document.getElementById('assembly-time-group').classList.add('hidden');
                document.getElementById('has-elevator').checked = false;
                document.getElementById('observations').value = '';
                this.actualizarCostes();
            },

            // CARGAR PEDIDOS (DESDE API VERCEL)
            cargarPedidos: async function() {
                try {
                    const response = await fetch('/api/orders');
                    
                    if (!response.ok) throw new Error('Error cargando pedidos');

                    this.pedidosData = await response.json();
                    this.mostrarPedidos(this.pedidosData);
                } catch (err) {
                    console.error(err);
                    document.getElementById('tabla-pedidos').innerHTML = `<div class="alert alert-error">Error: ${err.message}</div>`;
                }
            },

            // MOSTRAR PEDIDOS
            mostrarPedidos: function(pedidos) {
                if (pedidos.length === 0) {
                    document.getElementById('tabla-pedidos').innerHTML = '<p style="text-align: center; padding: 40px; color: #999;">Sin pedidos registrados</p>';
                    return;
                }

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Factura</th>
                                <th>Cliente</th>
                                <th>Población</th>
                                <th>Estado</th>
                                <th>Total</th>
                                <th>Fecha</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                pedidos.forEach(p => {
                    const total = (p.shipping_cost + p.assembly_cost).toFixed(2);
                    const fecha = new Date(p.created_at).toLocaleDateString('es-ES');
                    const badge = this.getStatusBadge(p.status);

                    html += `
                        <tr>
                            <td><strong>${p.invoice_number}</strong></td>
                            <td>${p.customer_name}</td>
                            <td>${p.populations?.zone || '-'}</td>
                            <td>${badge}</td>
                            <td>${total}€</td>
                            <td>${fecha}</td>
                            <td>
                                <button class="btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="app.verDetalles('${p.id}')">Ver</button>
                            </td>
                        </tr>
                    `;
                });

                html += `</tbody></table>`;
                document.getElementById('tabla-pedidos').innerHTML = html;
            },

            // VER DETALLES
            verDetalles: function(pedidoId) {
                const pedido = this.pedidosData.find(p => p.id === pedidoId);
                if (!pedido) return;

                const total = (pedido.shipping_cost + pedido.assembly_cost).toFixed(2);

                let html = `
                    <div style="font-size: 14px; line-height: 2;">
                        <p><strong>Factura:</strong> ${pedido.invoice_number}</p>
                        <p><strong>Estado:</strong> ${this.getStatusBadge(pedido.status)}</p>
                        <p><strong>Cliente:</strong> ${pedido.customer_name}</p>
                        <p><strong>Email:</strong> ${pedido.customer_email || '-'}</p>
                        <p><strong>Teléfono:</strong> ${pedido.customer_phone || '-'}</p>
                        <p><strong>Dirección:</strong> ${pedido.address}</p>
                        <p><strong>Población:</strong> ${pedido.populations?.name}</p>
                        <p><strong>Porte:</strong> ${pedido.shipping_cost.toFixed(2)}€</p>
                        <p><strong>Montaje:</strong> ${pedido.assembly_cost.toFixed(2)}€</p>
                        <p><strong style="font-size: 16px;">TOTAL: ${total}€</strong></p>
                    </div>
                `;

                document.getElementById('modal-body').innerHTML = html;
                document.getElementById('modal-pedido').classList.add('active');
            },

            // GET STATUS BADGE
            getStatusBadge: function(status) {
                const badges = {
                    'registrado': '<span class="badge badge-primary">📝 Registrado</span>',
                    'confirmado': '<span class="badge badge-warning">⏰ Confirmado</span>',
                    'en_reparto': '<span class="badge badge-warning">🚗 En Reparto</span>',
                    'entregado': '<span class="badge badge-success">✅ Entregado</span>',
                    'no_disponible': '<span class="badge badge-danger">❌ No Disponible</span>'
                };
                return badges[status] || status;
            },

            // FILTRAR PEDIDOS
            filtrarPedidos: function() {
                const filtro = document.getElementById('filtro-cliente').value.toLowerCase();
                const estado = document.getElementById('filtro-estado').value;

                let filtrados = this.pedidosData.filter(p => 
                    (p.customer_name.toLowerCase().includes(filtro) || 
                    p.invoice_number.toLowerCase().includes(filtro)) &&
                    (!estado || p.status === estado)
                );

                this.mostrarPedidos(filtrados);
            },

            // SWITCH TAB
            switchTab: function(tab) {
                document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                document.getElementById(tab).classList.add('active');
                event.target.classList.add('active');
            },

            // CERRAR MODAL
            cerrarModal: function() {
                document.getElementById('modal-pedido').classList.remove('active');
            },

            // MOSTRAR MENSAJE
            mostrarMensaje: function(tab, mensaje, tipo) {
                const div = document.getElementById(`mensaje-${tab}`);
                const clase = tipo === 'error' ? 'alert-error' : 'alert-success';
                div.innerHTML = `<div class="alert ${clase}">${mensaje}</div>`;
                setTimeout(() => { div.innerHTML = ''; }, 5000);
            }
        };

        // FOCUS EN LOGIN
        document.getElementById('employee-id').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') app.login();
        });
        document.getElementById('employee-id').focus();
    </script>
</body>
</html>
