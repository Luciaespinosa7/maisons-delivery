    <script>
        // Firebase REST API
        const FIREBASE_DB_URL = 'https://maisons-delivery-default-rtdb.europe-west1.firebasedatabase.app/pedidos';

        async function firebaseGet() {
            try {
                const response = await fetch(FIREBASE_DB_URL + '.json');
                const data = await response.json();
                if (data) {
                    return Object.keys(data).map(key => ({
                        id: key,
                        ...data[key]
                    }));
                }
                return [];
            } catch (error) {
                console.error('Error Firebase GET:', error);
                throw error;
            }
        }

        async function firebasePost(pedidoData) {
            try {
                const response = await fetch(FIREBASE_DB_URL + '.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pedidoData)
                });
                const data = await response.json();
                return { id: data.name, ...pedidoData };
            } catch (error) {
                console.error('Error Firebase POST:', error);
                throw error;
            }
        }

        async function firebaseDelete(id) {
            try {
                const response = await fetch(FIREBASE_DB_URL + '/' + id + '.json', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' }
                });
                return await response.json();
            } catch (error) {
                console.error('Error Firebase DELETE:', error);
                throw error;
            }
        }

        async function firebasePut(id, updateData) {
            try {
                const response = await fetch(FIREBASE_DB_URL + '/' + id + '.json', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateData)
                });
                return await response.json();
            } catch (error) {
                console.error('Error Firebase PUT:', error);
                throw error;
            }
        }

                    p.parish.toLowerCase().includes(searchTerm)

                dropdown.innerHTML = filtradas.map(p => `

                if (!this.populacionSeleccionada) return;
                const hasFurniture = document.getElementById('has-furniture').checked;
                const needsAssembly = document.getElementById('needs-assembly').checked;
                const shippingCost = hasFurniture ? this.populacionSeleccionada.shipping_cost_furniture : this.populacionSeleccionada.shipping_cost;
                const assemblyCost = needsAssembly ? this.populacionSeleccionada.assembly_cost : 0;
                const total = shippingCost + assemblyCost;
                document.getElementById('shipping-cost').textContent = shippingCost.toFixed(2) + '€';
                document.getElementById('assembly-cost').textContent = assemblyCost.toFixed(2) + '€';
                document.getElementById('total-cost').textContent = total.toFixed(2) + '€';

            crearPedido: async function() {
                const invoice = document.getElementById('invoice').value.trim().toUpperCase();
                const customerName = document.getElementById('customer-name').value.trim();
                const customerEmail = document.getElementById('customer-email').value.trim();
                const customerPhone = document.getElementById('customer-phone').value.trim();
                const representativeName = document.getElementById('representative-name').value.trim();
                const representativePhone = document.getElementById('representative-phone').value.trim();
                const address = document.getElementById('address').value.trim();
                const references = document.getElementById('references').value.trim();
                const needsAssembly = document.getElementById('needs-assembly').checked;
                const hasFurniture = document.getElementById('has-furniture').checked;
                const observations = document.getElementById('observations').value.trim();

                if (!invoice || !customerName || !address || !this.populacionSeleccionada) {
                    this.mostrarMensaje('create-message', 'Completa tots els camps obligatoris', 'error');
                    return;
                }

                const shippingCost = hasFurniture ? this.populacionSeleccionada.shipping_cost_furniture : this.populacionSeleccionada.shipping_cost;
                const assemblyCost = needsAssembly ? this.populacionSeleccionada.assembly_cost : 0;

                const pedidoData = {
                    invoice_number: invoice,
                    customer_name: customerName,
                    customer_email: customerEmail || '',
                    customer_phone: customerPhone || '',
                    representative_name: representativeName || '',
                    representative_phone: representativePhone || '',
                    address: address,
                    references: references || '',
                    shipping_cost: shippingCost,
                    assembly_cost: assemblyCost,
                    needs_assembly: needsAssembly,
                    has_furniture: hasFurniture,
                    population: this.populacionSeleccionada.name,
                    zone: this.populacionSeleccionada.zone,
                    observations: observations || '',
                    status: 'registrado',
                    created_at: new Date().toISOString(),
                    created_by: this.currentUser.id
                };

                try {
                    await firebasePost(pedidoData);
                    
                    // Enviar email al equipo de logística
                    await this.enviarEmailLogistica(pedidoData);
                    
                    this.mostrarMensaje('create-message', `✅ Pedido creat: ${invoice}`, 'success');
                    this.limpiarFormulario();
                    await this.cargarPedidos();
                } catch (error) {
                    this.mostrarMensaje('create-message', '❌ Error en crear pedido: ' + error.message, 'error');
                }
            },

            enviarEmailLogistica: async function(pedidoData) {
                try {
                    await emailjs.send('service_prjsf2c', 'template_he6ten1', {
                        invoice_number: pedidoData.invoice_number,
                        customer_name: pedidoData.customer_name,
                        customer_phone: pedidoData.customer_phone,
                        address: pedidoData.address,
                        population: pedidoData.population,
                        zone: pedidoData.zone,
                        shipping_cost: pedidoData.shipping_cost.toFixed(2),
                        assembly_cost: pedidoData.assembly_cost.toFixed(2),
                        total_cost: (pedidoData.shipping_cost + pedidoData.assembly_cost).toFixed(2),
                        has_furniture: pedidoData.has_furniture ? 'Sí' : 'No',
                        needs_assembly: pedidoData.needs_assembly ? 'Sí' : 'No',
                        observations: pedidoData.observations || 'Cap'
                    });
                    console.log('Email enviat correctament a l\'equip de logística');
                } catch (error) {
                    console.error('Error al enviar email:', error);
                }
            },

            guardarPedidoEditado: async function() {
                if (!this.pedidoEditando) return;
                const deliveryDate = document.getElementById('edit-delivery-date').value;
                const deliveryPerson = document.getElementById('edit-delivery-person').value;
                const photoFile = document.getElementById('edit-delivery-photo').files[0];

                let status = document.getElementById('edit-status').value;

                // Lógica automática de estados
                if (photoFile) {
                    // Si sube foto → ENTREGADO (automático)
                    status = 'entregado';
                } else if (deliveryDate) {
                    // Si pone fecha → CONFIRMADO (automático)
                    status = 'confirmado';
                } else {
                    // Si no hay foto ni fecha nueva, respetar el estado seleccionado en el dropdown
                    status = document.getElementById('edit-status').value;
                }

                // Convertir foto a base64 si existe
                let photoBase64 = null;
                if (photoFile) {
                    photoBase64 = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(photoFile);
                    });
                }

                try {
                    const updateData = {
                        status: status,
                        delivery_date: deliveryDate || this.pedidoEditando.delivery_date || null,
                        delivery_person_name: deliveryPerson || this.pedidoEditando.delivery_person_name || null
                    };

                    if (photoBase64) {
                        updateData.delivery_photo_url = photoBase64;
                    }

                    await firebasePut(this.pedidoEditando.id, updateData);
                    await this.cargarPedidos();
                    this.cerrarModalEditar();
                    alert('✅ Pedido actualitzat - Estat: ' + status.toUpperCase());
                } catch (error) {
                    alert('❌ Error: ' + error.message);
                }
            },

            eliminarPedido: async function(id) {
                if (!confirm('¿Estàs segur que vols esborrar aquest pedido? Aquesta acció no es pot desfer.')) {
                    return;
                }
                try {
                    await firebaseDelete(id);
                    await this.cargarPedidos();
                    alert('✅ Pedido esborrat correctament');
                } catch (error) {
                    alert('❌ Error en esborrar: ' + error.message);
                }
            },

            borrarFotoAlbaran: async function() {
                if (!this.pedidoEditando) return;
                if (!confirm('¿Estàs segur que vols esborrar la foto de l\'albarán?')) {
                    return;
                }
                
                try {
                    // Cambiar estado a confirmado si estaba en entregado
                    let newStatus = this.pedidoEditando.status;
                    if (newStatus === 'entregado') {
                        newStatus = 'confirmado';
                    }
                    
                    await firebasePut(this.pedidoEditando.id, {
                        delivery_photo_url: null,
                        status: newStatus
                    });
                    await this.cargarPedidos();
                    this.cerrarModalEditar();
                    alert('✅ Foto de l\'albarán esborrada');
                } catch (error) {
                    alert('❌ Error: ' + error.message);
                }
            },
